apiVersion: napt/v1

name: "7-Zip (x86) MSI"
id: "napt-7zip-x86-msi"

discovery:
  strategy: web_scrape
  page_url: "https://www.7-zip.org/download.html"
  link_selector: 'a[href$=".msi"]:not([href$="-x64.msi"])'
  version_pattern: "7z(\\d{2})(\\d{2})"
  version_format: "{0}.{1}"

intune:
  detection:
    display_name: "7-Zip *"
    override_msi_display_name: true

# MSI installers auto-generate install/uninstall commands at build time:
#   Install:   Start-ADTMsiProcess -Action Install -FilePath "<filename>" ...
#   Uninstall: Uninstall-ADTApplication -Name "<ProductName>" (exact match)
# Set psadt.override_msi_commands: true to use custom commands instead.

psadt:
  app_vars:
    AppName: "7-Zip"
    AppVersion: "{{discovered_version}}"
    AppVendor: "Igor Pavlov"
